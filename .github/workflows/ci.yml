name: QA Automation CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo manual
        run: |
          git clone https://github.com/Robertovillarino/atmosphere-tests.git .

      - name: Instalar Java 21 y Maven
        run: |
          sudo apt update
          sudo apt install -y maven openjdk-21-jdk
          java -version
          javac -version

      - name: Ejecutar pruebas
        run: |
          mvn clean test