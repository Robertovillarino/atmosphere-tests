name: QA Automation CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio manualmente
        run: |
          git clone https://github.com/Robertovillarino/atmosphere-tests.git .
      
      - name: Instalar Java y Maven
        run: |
          sudo apt update
          sudo apt install -y maven openjdk-21-jdk
      
      - name: Ejecutar pruebas
        run: |
          mvn clean test